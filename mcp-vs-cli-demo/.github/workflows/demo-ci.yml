# ─────────────────────────────────────────────────────────────────────────────
# JOB 5: report — publish HTML report as workflow summary
# ─────────────────────────────────────────────────────────────────────────────
  report:
    name: Publish Report
    needs: [smoke, regression]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download regression results
        uses: actions/download-artifact@v4
        with:
          name: regression-results
          path: results/
        continue-on-error: true

      - name: Report summary
        run: |
          echo "## Test Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke (CLI) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Regression (CLI) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Demo | Requires API key — see docs |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See [COMPARISON_MATRIX.md](./docs/COMPARISON_MATRIX.md) for full analysis." >> $GITHUB_STEP_SUMMARY
